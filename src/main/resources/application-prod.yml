spring:
  cloud:
    gcp:
      sql:
        enabled: false # 중요: 이 자동 설정을 꺼야 우리가 설정한 url이 우선 적용됩니다.
      secretmanager:
        enabled: true  # Secret Manager를 쓰기 위해 이건 유지합니다.
  datasource:
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  sql:
    init:
      mode: always
      continue-on-error: true


logging:
  level:
    root: info

llm:
  base-url: ${LLM_BASE_URL:http://localhost:8000}
  chat-base-url: ${LLM_CHAT_BASE_URL:${LLM_BASE_URL:http://localhost:8000}}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

frontend:
  url: ${FRONTEND_URL}

oauth2:
  providers:
    google:
      client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
      client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:}
      # 정석 OAuth2 플로우: 프론트엔드 콜백 URL로 설정
      redirect-uri: ${OAUTH2_GOOGLE_REDIRECT_URI:${FRONTEND_URL}/auth/oauth2/callback}
      token-url: https://oauth2.googleapis.com/token
    kakao:
      client-id: ${OAUTH2_KAKAO_CLIENT_ID}
      client-secret: ${OAUTH2_KAKAO_CLIENT_SECRET}
      # 정석 OAuth2 플로우: 프론트엔드 콜백 URL로 설정
      redirect-uri: ${OAUTH2_KAKAO_REDIRECT_URI:${FRONTEND_URL}/auth/oauth2/callback}
      token-url: https://kauth.kakao.com/oauth/token
